<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazura Expert v14.4 - Ultimate Stable</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #27ae60; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid #edf2f7; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .version-badge { font-size: 0.7em; background: #ebf8ff; color: #2b6cb0; padding: 4px 10px; border-radius: 10px; font-weight: bold; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 10px 18px; cursor: pointer; border-radius: 8px; background: #edf2f7; border: none; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .tab.active { background: var(--accent); color: white; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        textarea, input { width: 100%; padding: 14px; border: 1px solid #cbd5e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }
        textarea:focus { border-color: var(--accent); outline: none; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 14px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); flex: 1; min-width: 140px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        #output { background: #fdfdfd; padding: 20px; border: 1px solid #e2e8f0; border-right: 6px solid var(--accent); border-radius: 10px; white-space: pre-wrap; margin-top: 20px; line-height: 1.7; word-wrap: break-word; font-size: 16px; }
        
        .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-card { color: #c53030; background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; }

        @media print { .tabs, button, textarea, input, header p, .version-badge { display: none !important; } .container { box-shadow: none; border: none; padding: 0; } #output { border: none; padding: 0; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2 style="margin:0;">🛠️ Dazura Expert</h2>
            <p style="margin:0; font-size:0.85em; color:#718096;">ניהול הנדסה וייצור חיווט</p>
        </div>
        <span class="version-badge">v14.4 Stable</span>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="showSection('user-section', this)">ניתוח BOM</button>
        <button class="tab" onclick="showSection('inventory-section', this)">מלאי מחסן</button>
        <button class="tab" onclick="showSection('admin-section', this)">הגדרות (Admin)</button>
    </div>

    <div id="user-section" class="section active">
        <textarea id="inputParts" style="height: 140px;" placeholder="הכנס מק&quot;טים לניתוח (אחד בכל שורה)..."></textarea>
        <div class="btn-group">
            <button onclick="runAnalysis()">
                <div id="loader" class="loader"></div> נתח פרויקט
            </button>
            <button style="background:#718096" onclick="window.print()">📄 הדפס PDF ללקוח/ייצור</button>
        </div>
        <div id="output">המתן להזנת נתונים...</div>
    </div>

    <div id="inventory-section" class="section">
        <h3>📦 מלאי "כספת"</h3>
        <p style="font-size:0.9em; color:#4a5568;">הדבק כאן רשימת מלאי (מק"ט, כמות, מיקום). הסוכן יתעדף רכיבים אלו.</p>
        <textarea id="inventoryData" style="height: 250px;" placeholder="Part Number, Quantity, Location..."></textarea>
        <button style="background:var(--success)" onclick="saveData('dazura_inventory', 'inventoryData')">💾 שמור רשימת מלאי</button>
    </div>

    <div id="admin-section" class="section">
        <h3>🧠 הגדרות בינה מלאכותית</h3>
        <label style="font-weight:bold;">Gemini API Key:</label>
        <input type="password" id="apiKeyInput" placeholder="הדבק כאן את המפתח מ-Google AI Studio">
        
        <label style="font-weight:bold;">הנחיות מערכת (Prompt):</label>
        <textarea id="systemPromptInput" style="height: 200px;"></textarea>
        
        <button style="background:var(--success)" onclick="saveAdmin()">💾 שמור הגדרות מערכת</button>
    </div>
</div>

<script>
    const DEFAULT_PROMPT = `אתה מומחה בכיר להנדסת חיווט וייצור. נתח את המק"טים הבאים וספק דוח מפורט:
1. זיהוי הנדסי: יצרן, AWG, וקוטר בידוד מקסימלי (OD). האם חוט PVC/סיליקון יתאים?
2. מלאי פנימי: בדוק מול המלאי שסופק. ציין מיקום או חלופה קיימת.
3. דוח לקוח: טבלה טכנית ויזואלית [attachment_0](attachment), יתרונות הנדסיים ועלות חומר גלם סופית.
4. הוראות עבודה: שלבי חשיפה (Strip), כלי לחיצה (Crimper) והגדרות, וסדר הכנסה לבית הקונקטור.
5. פתרון תקלות: צ'ק-ליסט QA למקרה שהפין לא ננעל או הלחיצה נכשלה.
6. רכש: קישורי חיפוש ל-Mouser/DigiKey במידה ואין במלאי.`;

    window.onload = () => {
        document.getElementById('systemPromptInput').value = localStorage.getItem('dazura_prompt') || DEFAULT_PROMPT;
        document.getElementById('apiKeyInput').value = localStorage.getItem('dazura_api_key') || "";
        document.getElementById('inventoryData').value = localStorage.getItem('dazura_inventory') || "";
    };

    function showSection(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function saveData(key, id) {
        localStorage.setItem(key, document.getElementById(id).value);
        alert("הנתונים נשמרו בזיכרון המקומי.");
    }

    function saveAdmin() {
        localStorage.setItem('dazura_prompt', document.getElementById('systemPromptInput').value);
        localStorage.setItem('dazura_api_key', document.getElementById('apiKeyInput').value);
        alert("הגדרות המערכת עודכנו.");
    }

    async function runAnalysis() {
    const parts = document.getElementById('inputParts').value;
    const prompt = localStorage.getItem('dazura_prompt') || DEFAULT_PROMPT;
    const inventory = localStorage.getItem('dazura_inventory') || "";
    const apiKey = localStorage.getItem('dazura_api_key');
    
    const loader = document.getElementById('loader');
    const output = document.getElementById('output');

    if (!apiKey) {
        output.innerHTML = "<div class='error-card'>❌ חסר API Key בהגדרות!</div>";
        return;
    }
    if (!parts) return alert("הזן מק\"טים לניתוח");

    loader.style.display = "inline-block";
    output.innerText = "מתחבר לשרת הנדסי (v1 Stable)...";

    try {
        // הכתובת המדויקת והיציבה ביותר:
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ 
                    parts: [{ 
                        text: `${prompt}\n\nמלאי:\n${inventory}\n\nמק"טים לניתוח:\n${parts}` 
                    }] 
                }]
            })
        });

        const data = await response.json();

        if (data.candidates && data.candidates[0].content) {
            // הצלחה! מציגים את התשובה
            output.innerText = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
            // פירוט השגיאה מגוגל
            output.innerHTML = `<div class='error-card'>❌ שגיאת גוגל: ${data.error.message}</div>`;
        } else {
            output.innerHTML = "<div class='error-card'>❌ התקבלה תשובה לא צפויה מהשרת.</div>";
        }
    } catch (e) {
        output.innerHTML = `<div class='error-card'>❌ שגיאת תקשורת: ${e.message}</div>`;
    } finally {
        loader.style.display = "none";
    }
}

        if (finalResponse) {
            output.innerText = finalResponse;
        } else {
            output.innerHTML = "<div class='error-card'>❌ שגיאה: לא ניתן היה לקבל תשובה מגוגל. בדוק שהמפתח תקין ושאין חסימת אינטרנט.</div>";
        }
        loader.style.display = "none";
    }
</script>
</body>
</html>
