    .header { background: var(--ink); color: white; padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; }

<script>
let currentMode = 'bom';
let history = JSON.parse(localStorage.getItem('dazura_history') || '[]');

window.onload = () => {
    const key = localStorage.getItem('dazura_gemini_key') || '';
    const model = localStorage.getItem('dazura_model') || 'gemini-2.5-flash-lite';
    document.getElementById('apiKeyInput').value = key;
    document.getElementById('modelSelect').value = model;
    updateKeyStatus(key);
    loadInventory();
    renderHistory();
};

function switchTab(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if (id === 'history') renderHistory();
}

function selectMode(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    currentMode = el.dataset.mode;
    const labels = { bom:'נתח BOM', quick:'זהה מהיר', alt:'מצא חלופות', stock:'בדוק מלאי' };
    document.getElementById('btnLabel').textContent = labels[currentMode];
}

function modeLabel() {
    return { bom:'BOM מלא', quick:'זיהוי מהיר', alt:'חלופות', stock:'בדיקת מלאי' }[currentMode] || 'ניתוח';
}

function saveSettings() {
    const key = document.getElementById('apiKeyInput').value.trim();
    const model = document.getElementById('modelSelect').value;
    localStorage.setItem('dazura_gemini_key', key);
    localStorage.setItem('dazura_model', model);
    updateKeyStatus(key);
    showToast('settings-toast');
}

function updateKeyStatus(key) {
    const ok = key && key.length > 10;
    document.getElementById('keyDot').className = 'dot ' + (ok ? 'ok' : 'missing');
    document.getElementById('keyLabel').textContent = ok ? 'מוגדר ✓' : 'לא הוגדר';
}

function buildPrompt(parts) {
    const inv = JSON.parse(localStorage.getItem('dazura_inventory') || '[]');
    const invText = inv.length ? '\n\nמלאי קיים:\n' + inv.map(i => `${i.part}: ${i.qty} יח׳`).join('\n') : '';

    const prompts = {
        bom: `אתה מומחה הנדסת חיווט ו-BOM. נתח את המק"טים ולכל אחד ציין: שם+יצרן, סוג, מתח/זרם מקסימלי, שימושים, הערות. ללא Markdown, בעברית.\n\n${parts}${invText}`,
        quick: `זהה בקצרה (שורה לכל מק"ט: מק"ט | שם | יצרן | סוג). בעברית.\n\n${parts}`,
        alt: `מצא 2-3 חלופות לכל מק"ט עם מספר חלק, יצרן, רמת תאימות. בעברית, ללא Markdown.\n\n${parts}`,
        stock: `השווה מק"טים למלאי הקיים. לכל מק"ט: כמות מבוקשת, כמות במלאי, עודף/חוסר. בעברית.\n\n${parts}${invText || '\n\nלא הוגדר מלאי.'}`
    };
    return prompts[currentMode];
}

async function runAnalysis() {
    const parts = document.getElementById('inputParts').value.trim();
    const apiKey = localStorage.getItem('dazura_gemini_key');
    const model  = localStorage.getItem('dazura_model') || 'gemini-2.5-flash-lite';
    const resultArea = document.getElementById('result-area');
    const loader = document.getElementById('loader');
    const btn    = document.getElementById('analyzeBtn');
    const btnLabel = document.getElementById('btnLabel');
    const origLabel = btnLabel.textContent;

    if (!apiKey) {
        showError(resultArea, 'חסר API Key', 'עבור להגדרות והזן Gemini API Key חינמי מ־aistudio.google.com');
        return;
    }
    if (!parts) {
        showError(resultArea, 'קלט ריק', 'הזן לפחות מק"ט אחד.');
        return;
    }

    loader.style.display = 'block';
    btn.disabled = true;
    btnLabel.textContent = 'מנתח...';
    resultArea.innerHTML = `<div class="output-box"><div class="output-hdr"><span>פלט · ${modeLabel()}</span></div><div class="output-body" id="out-body"><span style="color:var(--muted);font-style:italic;">טוען...</span></div></div>`;

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: buildPrompt(parts) }] }],
                generationConfig: { temperature: 0.2, maxOutputTokens: 2048 }
            })
        });

        const data = await response.json();

        if (data.error) {
            const code = data.error.code;
            const msg  = data.error.message || '';
            let hint = '';
            if (code === 429) hint = '\n\n💡 חרגת ממכסה — המתן כמה שניות ונסה שוב, או עבור ל-gemini-2.5-flash-lite בהגדרות.';
            else if (code === 404) hint = '\n\n💡 מודל לא נמצא — בחר gemini-1.5-flash-latest בהגדרות.';
            else if (code === 403 || code === 401) hint = '\n\n💡 API Key שגוי — בדוק בהגדרות.';
            showError(resultArea, `Google API Error ${code}`, msg + hint);
            return;
        }

        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (!text) { showError(resultArea, 'תשובה ריקה', 'ה-API לא החזיר תוצאה.'); return; }

        resultArea.innerHTML = `
            <div class="output-box">
                <div class="output-hdr">
                    <span>פלט · ${modeLabel()}</span>
                    <button class="copy-btn" onclick="copyText(this)">העתק</button>
                </div>
                <div class="output-body" id="out-body">${escHtml(text)}</div>
            </div>`;

        saveToHistory(parts, text);

    } catch(e) {
        showError(resultArea, 'שגיאת רשת', e.message);
    } finally {
        loader.style.display = 'none';
        btn.disabled = false;
        btnLabel.textContent = origLabel;
    }
}

function copyText(btn) {
    const body = document.getElementById('out-body');
    navigator.clipboard.writeText(body ? body.innerText : '').then(() => { btn.textContent = 'הועתק ✓'; setTimeout(() => btn.textContent = 'העתק', 2000); });
}

function showError(container, title, msg) {
    container.innerHTML = `<div class="error-box"><div class="error-title">⚠ ${title}</div>${escHtml(msg)}</div>`;
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── History ──
function saveToHistory(input, output) {
    history.unshift({ date: new Date().toLocaleString('he-IL'), mode: modeLabel(), input: input.slice(0,80), output });
    if (history.length > 20) history.pop();
    localStorage.setItem('dazura_history', JSON.stringify(history));
}

function renderHistory() {
    const el = document.getElementById('history-list');
    if (!history.length) { el.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:30px 0;">אין היסטוריה עדיין</div>`; return; }
    el.innerHTML = history.map((h,i) => `
        <div class="hist-item">
            <div class="hist-meta">
                <span class="hist-mode">${h.mode}</span>
                <span class="hist-date">${h.date}</span>
            </div>
            <div class="hist-input">${escHtml(h.input)}${h.input.length >= 80 ? '…' : ''}</div>
            <button class="copy-btn" onclick="toggleHist(${i})">הצג תוצאה ▾</button>
            <div class="hist-body" id="hist-${i}">${escHtml(h.output)}</div>
        </div>`).join('');
}

function toggleHist(i) {
    const el = document.getElementById(`hist-${i}`);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function clearHistory() {
    if (!confirm('למחוק את כל ההיסטוריה?')) return;
    history = [];
    localStorage.removeItem('dazura_history');
    renderHistory();
}

// ── Inventory ──
function addInvRow(part='', qty='') {
    const c = document.getElementById('inv-rows');
    const row = document.createElement('div');
    row.className = 'inv-row';
    row.innerHTML = `
        <input type="text" placeholder='מק"ט' value="${escHtml(part)}">
        <input type="text" placeholder="0" value="${escHtml(qty)}">
        <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(row);
}

function saveInventory() {
    const rows = document.querySelectorAll('.inv-row');
    const data = [];
    rows.forEach(r => {
        const inputs = r.querySelectorAll('input');
        const part = inputs[0].value.trim(), qty = inputs[1].value.trim();
        if (part) data.push({ part, qty });
    });
    localStorage.setItem('dazura_inventory', JSON.stringify(data));
    showToast('inv-toast');
}

function loadInventory() {
    const saved = JSON.parse(localStorage.getItem('dazura_inventory') || '[]');
    if (!saved.length) { addInvRow(); return; }
    saved.forEach(i => addInvRow(i.part, i.qty));
}

function showToast(id) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2200);
}
</script>
