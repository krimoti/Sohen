    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: var(--sans);
        background: var(--surface);
        color: var(--ink);
        min-height: 100vh;
        padding: 16px;
    }

    .shell {
        max-width: 720px;
        margin: auto;
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 2px 28px rgba(0,0,0,0.09);
        overflow: hidden;
    }

    /* ── Header ── */
    .header {
        background: var(--ink);
        color: white;
        padding: 18px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .header-title { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.02em; }
    .badge {
        font-family: var(--mono);
        font-size: 0.68rem;
        background: rgba(26,110,245,0.3);
        border: 1px solid rgba(26,110,245,0.5);
        padding: 3px 10px;
        border-radius: 20px;
        color: #7eb3ff;
    }

    /* ── Tabs ── */
    .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: #fafbfc;
    }
    .tab {
        flex: 1;
        padding: 13px 10px;
        border: none;
        background: transparent;
        font-family: var(--sans);
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.18s;
        border-bottom: 3px solid transparent;
    }
    .tab:hover { color: var(--accent); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: white; }

    /* ── Sections ── */
    .section { display: none; padding: 22px; }
    .section.active { display: block; }

    /* ── Form ── */
    label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    textarea, input[type="text"], select {
        width: 100%;
        padding: 13px 15px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: var(--mono);
        font-size: 0.92rem;
        color: var(--ink);
        background: var(--surface);
        transition: border-color 0.18s, box-shadow 0.18s;
        margin-bottom: 14px;
    }
    textarea { height: 130px; resize: vertical; direction: ltr; text-align: left; }
    input[type="text"] { direction: ltr; text-align: left; }
    textarea:focus, input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(26,110,245,0.1);
        background: white;
    }

    /* ── Buttons ── */
    .btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        padding: 13px 22px; border: none; border-radius: 10px;
        font-family: var(--sans); font-size: 0.95rem; font-weight: 700;
        cursor: pointer; transition: all 0.18s; width: 100%;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #1559cc; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #93b4e8; cursor: not-allowed; transform: none; }
    .btn-success { background: var(--success); color: white; margin-top: 4px; }
    .btn-success:hover { background: #0b8a51; }
    .btn-ghost {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 9px 16px; border: 1.5px dashed var(--border);
        border-radius: 9px; background: transparent; color: var(--muted);
        font-family: var(--sans); font-size: 0.85rem; cursor: pointer;
        margin-bottom: 14px; transition: all 0.15s; width: auto;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-remove {
        width: 34px; height: 34px; padding: 0;
        border: 1.5px solid var(--border); border-radius: 8px;
        background: white; color: var(--danger); font-size: 0.9rem;
        cursor: pointer; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
    }

    /* ── Output ── */
    .output-wrap { margin-top: 18px; }
    .output-box {
        border: 1.5px solid var(--border);
        border-right: 5px solid var(--accent);
        border-radius: 10px;
        background: var(--surface);
        overflow: hidden;
    }
    .output-hdr {
        background: var(--accent2);
        padding: 8px 14px;
        font-size: 0.72rem; font-weight: 700;
        color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
        border-bottom: 1px solid #c5d8fc;
        display: flex; justify-content: space-between; align-items: center;
    }
    .output-body {
        padding: 16px;
        font-family: var(--mono); font-size: 0.85rem; line-height: 1.8;
        white-space: pre-wrap; color: var(--ink);
        min-height: 80px; direction: ltr; text-align: left;
    }
    .output-placeholder {
        font-family: var(--sans); color: var(--muted);
        font-style: italic; direction: rtl; text-align: right;
    }

    /* ── Error ── */
    .error-box {
        margin-top: 18px;
        background: var(--danger-bg);
        border: 1.5px solid #f5b8c0;
        border-right: 5px solid var(--danger);
        border-radius: 10px;
        padding: 14px 16px;
        font-family: var(--mono); font-size: 0.82rem;
        color: var(--danger); direction: ltr; text-align: left; line-height: 1.6;
    }
    .error-title { font-weight: 700; margin-bottom: 6px; }

    /* ── Spinner ── */
    .spinner {
        width: 16px; height: 16px;
        border: 2.5px solid rgba(255,255,255,0.3);
        border-top-color: white; border-radius: 50%;
        animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Streaming cursor ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); vertical-align: text-bottom; animation: blink 1s step-start infinite; margin-right: 2px; }

    /* ── Inventory ── */
    .inv-header-row {
        display: grid; grid-template-columns: 1fr 1fr 36px;
        gap: 8px; margin-bottom: 6px;
    }
    .inv-header-row span {
        font-size: 0.72rem; font-weight: 700; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.05em;
    }
    .inv-row {
        display: grid; grid-template-columns: 1fr 1fr 36px;
        gap: 8px; margin-bottom: 8px; align-items: center;
    }
    .inv-row input { margin-bottom: 0; }

    /* ── Alert toast ── */
    .toast {
        display: none; margin-top: 10px; padding: 10px 14px;
        border-radius: 9px; font-size: 0.85rem;
    }
    .toast-success { background: #f0fff8; border: 1px solid #a3e4c4; color: var(--success); }

    /* ── Mode selector ── */
    .mode-pills {
        display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .pill {
        padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border);
        background: white; font-family: var(--sans); font-size: 0.82rem;
        font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.15s;
    }
    .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
    .pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ── Copy btn ── */
    .copy-btn {
        background: none; border: none; cursor: pointer;
        font-size: 0.75rem; color: var(--accent); font-family: var(--sans);
        font-weight: 600; padding: 2px 6px;
    }
    .copy-btn:hover { text-decoration: underline; }

    /* ── Powered badge ── */
    .powered {
        text-align: center; padding: 10px;
        font-size: 0.72rem; color: var(--muted);
        border-top: 1px solid var(--border);
    }
    .powered span { color: var(--accent); font-weight: 700; }
</style>

</div>

<script>
// ───────── State ─────────
let currentMode = 'bom';
let analysisHistory = JSON.parse(localStorage.getItem('dazura_history') || '[]');

// ───────── Init ─────────
window.onload = () => {
    loadInventory();
    renderHistory();
};

// ───────── Tabs ─────────
function switchTab(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if (id === 'history') renderHistory();
}

// ───────── Mode ─────────
function selectMode(el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    currentMode = el.dataset.mode;
    const labels = { bom:'נתח BOM', quick:'זהה מהיר', alt:'מצא חלופות', stock:'בדוק מלאי' };
    document.getElementById('btnLabel').textContent = labels[currentMode];
}

// ───────── Build prompt ─────────
function buildPrompt(parts) {
    const inv = JSON.parse(localStorage.getItem('dazura_inventory') || '[]');
    const invText = inv.length > 0
        ? '\n\nמלאי קיים:\n' + inv.map(i => `${i.part}: ${i.qty} יח׳`).join('\n')
        : '';

    const prompts = {
        bom: `אתה מומחה הנדסת חיווט ו-BOM (Bill of Materials).
נתח את המק"טים הבאים ולכל אחד ספק:
• שם הרכיב + יצרן
• סוג ותיאור קצר
• מתח/זרם מקסימלי (אם רלוונטי)
• שימושים נפוצים
• הערות (סדרה, תאימות, חלופות ידועות)

מק"טים לניתוח:
${parts}${invText}

פורמט: טקסט ברור בעברית, ללא Markdown.`,

        quick: `זהה בקצרה את המק"טים הבאים (שורה אחת לכל מק"ט: מק"ט | שם | יצרן | סוג):
${parts}
ענה בעברית, טבלת טקסט פשוטה.`,

        alt: `מצא חלופות למק"טים הבאים.
לכל מק"ט ציין 2-3 חלופות עם מספר חלק, יצרן, ורמת תאימות (ישירה/פונקציונלית/חלקית):
${parts}
בעברית, ללא Markdown.`,

        stock: `בדוק את הצורך במק"טים הבאים מול המלאי הקיים:
${parts}${invText || '\n\nלא הוגדר מלאי — עדכן טאב מלאי.'}

לכל מק"ט ציין: כמות מבוקשת, כמות במלאי, עודף/חוסר.
בעברית, ללא Markdown.`
    };
    return prompts[currentMode] || prompts.bom;
}

// ───────── Main analysis ─────────
async function runAnalysis() {
    const parts = document.getElementById('inputParts').value.trim();
    const resultArea = document.getElementById('result-area');
    const loader = document.getElementById('loader');
    const btn = document.getElementById('analyzeBtn');
    const btnLabel = document.getElementById('btnLabel');
    const origLabel = btnLabel.textContent;

    if (!parts) {
        showError(resultArea, 'קלט ריק', 'הזן לפחות מק"ט אחד.');
        return;
    }

    loader.style.display = 'block';
    btn.disabled = true;
    btnLabel.textContent = 'מנתח...';

    // Build streaming output box
    resultArea.innerHTML = `
        <div class="output-wrap">
            <div class="output-box">
                <div class="output-hdr">
                    <span>פלט · ${modeLabel()}</span>
                    <button class="copy-btn" onclick="copyOutput()">העתק</button>
                </div>
                <div class="output-body" id="stream-out"><span class="cursor"></span></div>
            </div>
        </div>`;

    const streamEl = document.getElementById('stream-out');
    let fullText = '';

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                stream: true,
                messages: [{ role: 'user', content: buildPrompt(parts) }]
            })
        });

        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6).trim();
                if (data === '[DONE]') continue;
                try {
                    const json = JSON.parse(data);
                    const delta = json.delta?.text || json.delta?.delta?.text || '';
                    if (delta) {
                        fullText += delta;
                        streamEl.textContent = fullText;
                        streamEl.insertAdjacentHTML('beforeend', '<span class="cursor"></span>');
                    }
                } catch {}
            }
        }

        // Final clean output
        streamEl.textContent = fullText;

        // Save to history
        saveToHistory(parts, fullText);

    } catch (e) {
        showError(resultArea, 'שגיאה', e.message);
    } finally {
        loader.style.display = 'none';
        btn.disabled = false;
        btnLabel.textContent = origLabel;
    }
}

function modeLabel() {
    return { bom:'BOM מלא', quick:'זיהוי מהיר', alt:'חלופות', stock:'בדיקת מלאי' }[currentMode] || 'ניתוח';
}

function copyOutput() {
    const el = document.getElementById('stream-out');
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(() => alert('הועתק!'));
}

function showError(container, title, msg) {
    container.innerHTML = `<div class="error-box"><div class="error-title">⚠ ${title}</div>${escapeHtml(msg)}</div>`;
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ───────── History ─────────
function saveToHistory(input, output) {
    analysisHistory.unshift({
        date: new Date().toLocaleString('he-IL'),
        mode: modeLabel(),
        input: input.slice(0, 80),
        output
    });
    if (analysisHistory.length > 20) analysisHistory.pop();
    localStorage.setItem('dazura_history', JSON.stringify(analysisHistory));
}

function renderHistory() {
    const el = document.getElementById('history-list');
    if (!analysisHistory.length) {
        el.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:30px 0;">אין היסטוריה עדיין</div>`;
        return;
    }
    el.innerHTML = analysisHistory.map((h, i) => `
        <div style="border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span style="font-size:0.75rem;font-weight:700;color:var(--accent);">${h.mode}</span>
                <span style="font-size:0.72rem;color:var(--muted);font-family:var(--mono);">${h.date}</span>
            </div>
            <div style="font-family:var(--mono);font-size:0.8rem;color:var(--muted);margin-bottom:8px;direction:ltr;">${escapeHtml(h.input)}${h.input.length >= 80 ? '...' : ''}</div>
            <button class="copy-btn" onclick="expandHistory(${i})">הצג תוצאה ▾</button>
            <div id="hist-${i}" style="display:none;margin-top:10px;font-family:var(--mono);font-size:0.8rem;white-space:pre-wrap;direction:ltr;border-top:1px solid var(--border);padding-top:10px;">${escapeHtml(h.output)}</div>
        </div>`).join('');
}

function expandHistory(i) {
    const el = document.getElementById(`hist-${i}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function clearHistory() {
    if (!confirm('למחוק את כל ההיסטוריה?')) return;
    analysisHistory = [];
    localStorage.removeItem('dazura_history');
    renderHistory();
}

// ───────── Inventory ─────────
function addInvRow(part = '', qty = '') {
    const c = document.getElementById('inv-rows');
    const row = document.createElement('div');
    row.className = 'inv-row';
    row.innerHTML = `
        <input type="text" placeholder="מק&quot;ט" value="${escapeHtml(part)}">
        <input type="text" placeholder="0" value="${escapeHtml(qty)}">
        <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(row);
}

function saveInventory() {
    const rows = document.querySelectorAll('.inv-row');
    const data = [];
    rows.forEach(r => {
        const inputs = r.querySelectorAll('input');
        const part = inputs[0].value.trim();
        const qty  = inputs[1].value.trim();
        if (part) data.push({ part, qty });
    });
    localStorage.setItem('dazura_inventory', JSON.stringify(data));
    const t = document.getElementById('inv-toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2200);
}

function loadInventory() {
    const saved = JSON.parse(localStorage.getItem('dazura_inventory') || '[]');
    if (!saved.length) { addInvRow(); return; }
    saved.forEach(i => addInvRow(i.part, i.qty));
}
</script>
